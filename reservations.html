<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KnotCraft Eatery · Reservations</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<!-- Accessibility -->
<div class="accessibility-hub" id="accessibilityHub">
    <button id="highContrastToggle">🌓 Contrast</button>
    <button id="dyslexiaToggle">📖 Dyslexia</button>
    <button id="announceMode">🔊 Announce</button>
</div>

<nav class="navbar" id="navbar">
  <div class="nav-container">

    <div class="logo">
      <i class="fas fa-knot"></i>
      <span class="logo-text">KnotCraft Eatery</span>
    </div>

    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" class="nav-link">Home</a></li>
      <li><a href="about.html" class="nav-link">Our Knot</a></li>
      <li><a href="menu.html" class="nav-link">Menu</a></li>
      <li><a href="contact.html" class="nav-link">Contact</a></li>
      <li><a href="reservations.html" class="nav-link">Reserve</a></li>
    </ul>

    <div class="mobile-menu-toggle" id="menuToggle">
      <i class="fas fa-bars"></i>
    </div>

  </div>
</nav>

<!-- HEADER -->
<header class="reservation-hero">
    <div class="container">
        <h1>Reserve Your Knot</h1>
        <p>Tell us your threads — we’ll remember them forever.</p>
    </div>
</header>

<!-- MAIN -->
<main class="reservation-form-wrapper">

<div class="container">

    <div class="reservation-grid">

        <!-- FORM -->
        <form id="moodReservationForm">

            <div class="form-group">
                <label for="resName">Full Name *</label>
                <input type="text" id="resName" required>
            </div>

            <div class="form-group">
                <label for="resEmail">Email *</label>
                <input type="email" id="resEmail" required>
            </div>

            <div class="form-group">
                <label for="resDate">Date *</label>
                <input type="date" id="resDate" required>
            </div>

            <div class="form-group">
                <label for="resTime">Time *</label>
                <select id="resTime" required>
                    <option value="">Select time</option>
                    <option>11:00 AM</option>
                    <option>12:00 PM</option>
                    <option>2:00 PM</option>
                    <option>6:00 PM</option>
                    <option>8:00 PM</option>
                </select>
            </div>

            <div class="form-group">
                <label for="resGuests">Guests *</label>
                <select id="resGuests" required>
                    <option value="">Select guests</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5+</option>
                </select>
            </div>

            <!-- MOOD THREADS -->
            <div class="form-group full-width">
                <label>Mood Threads (optional)</label>

                <div class="thread-checkboxes">

                    <label><input type="checkbox" name="thread" value="hearing"> Hearing support</label>
                    <label><input type="checkbox" name="thread" value="anxiety"> Sensory comfort</label>
                    <label><input type="checkbox" name="thread" value="mobility"> Mobility access</label>
                    <label><input type="checkbox" name="thread" value="allergy"> Allergy care</label>

                </div>
            </div>

            <!-- STORY KNOT -->
            <div class="form-group full-width">
                <label for="storyKnot">Leave a Story-Knot (optional)</label>
                <textarea id="storyKnot" rows="3"
                placeholder="Example: The sound of sizzling food or a memory you want us to keep"></textarea>

                <small>We store this to personalize your next visit.</small>
            </div>

            <button type="submit" class="submit-btn">
                Weave My Reservation →
            </button>

        </form>

        <!-- SIDE WALL -->
        <aside class="knot-wall">

            <h3>Recent Guest Knots</h3>

            <div id="storyKnotsList">
                <p style="color:#9ca3af;">Loading community stories...</p>
            </div>

        </aside>

    </div>

</div>

</main>

<!-- FOOTER -->
<footer class="footer">
    <div class="container">

        <div class="footer-content">

            <div class="footer-logo">
                <i class="fas fa-knot"></i>
                <span>KnotCraft Eatery</span>
            </div>

            <p class="footer-text">
                © 2026 · Where every knot tells a story
            </p>

        </div>

    </div>
</footer>

<script src="script.js"></script>

</body>
</html>
